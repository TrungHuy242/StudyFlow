environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  provider: ^6.1.2
  flutter_dotenv: ^6.0.0
  supabase: ^2.10.4
  sqflite: ^2.3.3+1
  sqflite_common: ^2.5.4
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.1+2
  fl_chart: ^0.68.0
  timezone: ^0.9.4
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
